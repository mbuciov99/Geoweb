  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 800px;
			height: 600px;
    }
    #getZoomButton {
      position: absolute;
      top: 15px;
      left: 40px;
      z-index: 1001;
    }	
  </style>
</head>

<body>
	<div id='map'></div>
	<script>
		var map = L.map('map').setView([19.37504, -99.11346], 11); // ajustar coordenadas y nivel de zoom

		var osmLayer = L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png', {
			attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap<\/a> contributors'
		}).addTo(map);
		var OpenStreetMap_Mapnik = L.tileLayer('http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	       maxZoom: 19,
	       attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	    });
		var Esri_NatGeoWorldMap = L.tileLayer('http://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {
			attribution: 'Tiles &copy; Esri &mdash; National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA, iPC',
				maxZoom: 16
		});
		var OpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
			maxZoom: 17,
			attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
		});
		var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
			attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
		});
		//Mapas base Google
		// Calles
		var gCalles = googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    	maxZoom: 20,
    	subdomains:['mt0','mt1','mt2','mt3']
		});
		// Hibrido
		var gHibrido = googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
    	maxZoom: 20,
    	subdomains:['mt0','mt1','mt2','mt3']
		});
		// Satelite
		var gSatelite = googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
    	maxZoom: 20,
    	subdomains:['mt0','mt1','mt2','mt3']
		});
		// Terreno
		var gTerreno = googleTerrain = L.tileLayer('https://{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}',{
    	maxZoom: 20,
    	subdomains:['mt0','mt1','mt2','mt3']
		});

		var capasBase = {
			"Calles Mapnik": OpenStreetMap_Mapnik,
			"Nat Geo": Esri_NatGeoWorldMap,
			"Carreteras": osmLayer,
			"Topo": OpenTopoMap,
			"Satelite": Esri_WorldImagery,
			"Calles Google": gCalles,
			"Hibrido Google": gHibrido,
			"Satelite Google": gSatelite,
			"Terreno Google": gTerreno
		};

	//Verificar que 'name' y 'description' sean los nombres correctos de cada elemento geográfico de tu archivo GeoJSON
	function popUpInfo2(feature, layer) {
		if (feature.properties && feature.properties.name) {
			layer.bindPopup("<b>"+feature.properties.name+"</b><br>"+feature.properties.description);
		}
	}
	
	// Cargar GeoJSON desde un archivo externo
	var misdatos = L.geoJson(null, {
		onEachFeature: popUpInfo2
	});

	$.getJSON("poi/GeoWeb_CIG_2026.geojson", function (data) {
		misdatos.addData(data);
	});

	misdatos.addTo(map);

	$.getJSON("poi/coloniascdmx.geojson", function(coloniasdata) {
		L.geoJson(coloniasdata).addTo(map);
	});

			layer.bindPopup("<b>"+feature.properties.col_name+"</b><br/>"+feature.properties.mun_name + "<br/>" + feature.properties.sta_name);
		}
	}
	
	// Cargar GeoJSON desde un archivo externo
	var colonias = L.geoJson(null, {
		onEachFeature: popUpInfo
	});

	$.getJSON("poi/coloniascdmx.geojson", function (data) {
		colonias.addData(data);
	});

	colonias.addTo(map); */


	</script>
</body>
</html>
