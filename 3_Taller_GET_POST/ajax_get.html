<!DOCTYPE HTML>
<html>
<head>
    <title>GeoWeb: Taller GET y POST</title>
    <meta charset="utf-8" />
    <link rel="icon" href="data:," />
    <meta name="description" content="Intro a los metodos de formulario" />
    <meta name="keywords" content="html, geoweb, desarrollo web"/>
    <meta name="author" content="Grupo de Geoweb CIG 2025" />
    <meta name="copyright" content="CentroGeo 2026" />
    <meta name="robots" content="index,follow" />
    <meta http-equiv="cache-control" content="no-cache"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
<style>
	body {
		background-color: antiquewhite;
		font-size: 14px;
	}
	select {
		padding: 16px 20px;
  	border: none;
  	border-radius: 4px;
		background-color: #d4edf1;
	}
	span {
		background-color: lightsteelblue;
  	font-family: "Times New Roman", Times, serif;
	}
</style>
<script>
  $(document).ready(function(){
    $('#envio_get').submit(function() {
		//alert("Estilo JavaScript: " + tipo.options[tipo.selectedIndex].text);
		//alert("Estilo jQuery: " + $("#tipo option:selected").html());
      var URL = 'php/listaInst_get_pdo.php';
      var contenido_html = "";
      var ajax_get = $.ajax({
				type : "GET",
				url : URL,
				dataType : 'json',
				contentType: 'application/json',
				timeout:10000,
				data: {
					tipo: $('#tipo option:selected').html()
				},
				beforeSend : function() { 
						alert("Esperando respuesta desde servidor ubuntu");
				},
				success : function (response) {
					//console.log(response);
					// Limpiar contenido de span
					$('#contenido').html('');
					//alert('Se encontraron ' + response.length + " resultados");
					if (response.length > 0) {
						//Itera sobre los valores obtenidos
						for (var i in response) {
							contenido_html = "Nombre: " + response[i].nombre + "<br/>";
							contenido_html += "Tipo: " + response[i].tipo + "<br/>";
							contenido_html += "Municipio: " + response[i].delmun + "<br/>";
							contenido_html += "Entidad: "  + response[i].entidad + "<br/>";
							contenido_html += "Sector: "  + response[i].sector + "<br/>";
							contenido_html += "Rama: "  + response[i].rama + "<br/>";
							contenido_html += "Clase: "  + response[i].clase + "<br/>";
							contenido_html += "<hr/>";
							$('#contenido').append(contenido_html);
						} //fin del for	
					} else{
						contenido_html= "La consulta no tiene resultados" + "<br/>";
						$('#contenido').append(contenido_html);
					}
				},
				error : function(jqXHR, estado, error) {
						$('#contenido').html('Se produjo un error:' + estado + ' error: ' + error);
				},
				complete : function(jqXHR, estado) {
						alert("Se ha completado la solicitud al WS con el estado: " + estado);
				}
    	}); //fin del componente Ajax

			//previene el re-envío del requerimiento
			return false;
		}); //fin del evento submit
	}); //fin de document.ready function

</script>
</head>
<body>
<form action="#" method="get" id="envio_get">
    <select name="tipo" id="tipo">
        <option value="cpis">CENTROS DE INVESTIGACION</option>
        <option value="empresas">EMPRESAS</option>
        <option value="ies">INSTITUCIONES DE ENSEÑANZA SUPERIOR </option>
        <option value="iap">INSTITUCIONES DE LA ADMINISTRACION PUBLICA</option>
	    <option value="ip">INSTITUCIONES PRIVADAS NO LUCRATIVAS</option>
	    <option value="fisica">PERSONA FISICA</option>
		<option value="otracosa">OTRA COSA</option>
    </select>
	<input type="submit" value="Enviar">
</form>
<span id="contenido"></span>
</body>
</html>
